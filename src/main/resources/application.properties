spring.application.name=webdulich
server.port=8080

# ===============================
# MYSQL DATABASE
# Trước khi chạy project, tạo database bằng file database/webdulich_mysql.sql
# hoặc chạy lệnh: CREATE DATABASE webdulich_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/webdulich_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123@Abcd
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dùng update để Hibernate tự tạo/cập nhật bảng theo Entity hiện tại.
# Khi làm production thật nên đổi sang validate hoặc dùng migration.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.thymeleaf.cache=false

# Nếu bạn muốn chạy thử nhanh bằng H2, có thể tự đổi lại cấu hình.
# Bản này mặc định kết nối MySQL theo yêu cầu.
