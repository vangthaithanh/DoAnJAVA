<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body><header th:replace="~{fragments/layout :: header}"></header><section th:replace="~{fragments/layout :: pageBanner(${blog.title}, ${blog.summary})}"></section>
<main class="section-padding"><div class="container"><div class="row g-5"><article class="col-lg-8"><div class="blog-detail reveal"><img class="blog-hero-img" th:src="${blog.imageUrl}" th:alt="${blog.title}"><div class="news-meta mt-4"><span th:text="${blog.category}">Cẩm nang</span><span th:text="${#temporals.format(blog.publishedDate, 'dd MMM yyyy')}">02 Apr 2026</span><span><i class="fa-regular fa-user"></i> <span th:text="${blog.author}">WebDuLich Team</span></span></div><h1 th:text="${blog.title}">Bài viết</h1><p class="lead-muted" th:text="${blog.summary}">Tóm tắt</p><p class="blog-content" th:text="${blog.content}">Nội dung</p><div class="share-box"><strong>Chia sẻ bài viết</strong><div class="socials"><a href="#"><i class="fa-brands fa-facebook-f"></i></a><a href="#"><i class="fa-brands fa-twitter"></i></a><a href="#"><i class="fa-brands fa-linkedin-in"></i></a></div></div></div></article><aside class="col-lg-4"><div class="sidebar-widget reveal delay-1"><h4>Tour mới nhất</h4><a class="mini-property" th:each="p : ${latestTours}" th:href="@{/tours/{id}(id=${p.id})}"><img th:src="${p.imageUrl}" th:alt="${p.title}"><span><strong th:text="${p.title}">Tên tour</strong><em th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + 'đ'}">3,990,000đ</em></span></a></div><div class="sidebar-widget reveal delay-2"><h4>Chủ đề</h4><div class="tag-list"><a th:href="@{/blog}">Lịch trình</a><a th:href="@{/blog}">Tư vấn tour</a><a th:href="@{/blog}">Điểm đến</a><a th:href="@{/blog}">Kinh nghiệm</a></div></div></aside></div></div></main><footer th:replace="~{fragments/layout :: footer}"></footer><th:block th:replace="~{fragments/layout :: scripts}"></th:block></body></html>
