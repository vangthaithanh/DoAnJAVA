<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body><header th:replace="~{fragments/layout :: header}"></header><section th:replace="~{fragments/layout :: pageBanner(${agent.fullName}, ${agent.role})}"></section>
<main class="section-padding"><div class="container"><div class="row g-5"><div class="col-lg-4"><div class="agent-profile-side reveal"><img th:src="${agent.avatarUrl}" th:alt="${agent.fullName}"><h4 th:text="${agent.fullName}">Tư vấn viên</h4><p th:text="${agent.role}">Vai trò</p><div class="agent-contact-list"><p><i class="fa-solid fa-phone"></i> <span th:text="${agent.phone}"></span></p><p><i class="fa-regular fa-envelope"></i> <span th:text="${agent.email}"></span></p></div><div class="agent-social justify-content-center"><a th:href="${agent.facebookUrl}"><i class="fa-brands fa-facebook-f"></i></a><a th:href="${agent.twitterUrl}"><i class="fa-brands fa-twitter"></i></a><a th:href="${agent.linkedinUrl}"><i class="fa-brands fa-linkedin-in"></i></a></div></div></div><div class="col-lg-8"><div class="detail-card reveal delay-1"><h2>Thông tin tư vấn viên</h2><p class="detail-desc" th:text="${agent.bio}">Bio</p></div><div class="detail-card reveal delay-2"><h3>Tour đang phụ trách</h3><div class="alert alert-warning" th:if="${tours == null or #lists.isEmpty(tours)}">Tư vấn viên này hiện chưa phụ trách tour nào.</div><div class="row g-4"><div class="col-md-6" th:each="property : ${tours}"><article class="property-card tilt-card"><a class="property-img-wrap" th:href="@{/tours/{id}(id=${property.id})}"><img th:src="${property.imageUrl}" th:alt="${property.title}"><span class="sale-badge" th:text="${property.status}">Tour trọn gói</span></a><div class="property-body"><h5><a th:href="@{/tours/{id}(id=${property.id})}" th:text="${property.title}">Tour</a></h5><div class="property-price" th:text="${#numbers.formatDecimal(property.price, 0, 'COMMA', 0, 'POINT') + 'đ'}">3,990,000đ</div><p class="property-location"><i class="fa-solid fa-location-dot"></i><span th:text="${property.location}"></span></p></div></article></div></div></div></div></div></div></main><footer th:replace="~{fragments/layout :: footer}"></footer><th:block th:replace="~{fragments/layout :: scripts}"></th:block></body></html>
