<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<section th:replace="~{fragments/layout :: pageBanner('Tin nhắn', 'Trò chuyện với tư vấn viên để được hỗ trợ lên kế hoạch du lịch.')}"></section>
<div th:replace="~{fragments/layout :: flash}"></div>

<main class="section-padding account-page">
    <div class="container">
        <div class="account-layout">

            <!-- Sidebar: conversations list + start new -->
            <aside class="account-sidebar reveal">
                <div class="account-profile-card">
                    <h3><i class="fa-solid fa-comments" style="color:var(--theme);margin-right:6px;"></i> Tin nhắn</h3>
                    <p style="font-size:13px;color:#64748b;margin:4px 0 0;">Trò chuyện với tư vấn viên</p>
                </div>

                <!-- Existing conversations -->
                <div class="chat-conv-list" th:if="${!#lists.isEmpty(conversations)}">
                    <div class="chat-conv-section-label">
                        <span>Cuộc trò chuyện</span>
                    </div>
                    <a class="chat-conv-item" th:each="conv : ${conversations}"
                       th:href="@{/account/chat/{id}(id=${conv.id})}"
                       th:classappend="${conversation != null and conversation.id == conv.id ? 'active' : ''}">
                        <div class="chat-conv-avatar-sm"
                             th:text="${#strings.substring(conv.agentUser?.fullName, 0, 1)}">T</div>
                        <div class="chat-conv-item-info">
                            <div class="chat-conv-item-head">
                                <strong th:text="${conv.agentUser?.fullName}">Tư vấn viên</strong>
                                <span class="js-date-format-compact" th:data-date="${conv.updatedAt}">--</span>
                            </div>
                            <p th:text="${conv.lastMessagePreview}">--</p>
                        </div>
                        <span class="chat-unread-badge" th:if="${conv.unreadCount > 0}" th:text="${conv.unreadCount}">0</span>
                    </a>
                </div>

                <!-- Start new conversation -->
                <div class="chat-new-section">
                    <div class="chat-conv-section-label">
                        <span>Bắt đầu cuộc trò chuyện mới</span>
                    </div>
                    <div th:each="c : ${consultants}" class="chat-consultant-btn">
                        <form th:action="@{/account/chat/new}" method="post">
                            <input type="hidden" name="consultantId" th:value="${c.id}">
                            <button type="submit" class="chat-consultant-item">
                                <div class="chat-conv-avatar-sm" th:text="${#strings.substring(c.fullName, 0, 1)}">T</div>
                                <div class="chat-consultant-info">
                                    <strong th:text="${c.fullName}">Tư vấn viên</strong>
                                    <span>Nhắn tin tư vấn</span>
                                </div>
                                <i class="fa-solid fa-chevron-right" style="color:#94a3b8;font-size:12px;"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </aside>

            <!-- Main: empty state or placeholder -->
            <section class="account-content reveal delay-1">
                <div class="empty-state" style="padding: 80px 20px;">
                    <div class="empty-icon"><i class="fa-solid fa-comment-dots"></i></div>
                    <h3>Chọn một cuộc trò chuyện</h3>
                    <p>Chọn cuộc trò chuyện từ danh sách bên trái hoặc chọn tư vấn viên để bắt đầu.</p>
                </div>
            </section>

        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<style>
.chat-conv-list {
    max-height: 300px;
    overflow-y: auto;
    border-bottom: 1px solid #f1f5f9;
}
.chat-new-section {
    padding: 0 0 16px;
}
.chat-conv-section-label {
    padding: 10px 16px 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: #94a3b8;
    letter-spacing: 0.05em;
}
.chat-conv-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    text-decoration: none;
    color: inherit;
    border-bottom: 1px solid #f8fafc;
    transition: background 0.15s;
    cursor: pointer;
}
.chat-conv-item:hover { background: #f8fafc; }
.chat-conv-item.active {
    background: #eff6ff;
    border-left: 3px solid var(--theme);
}
.chat-conv-avatar-sm {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--theme);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
}
.chat-conv-item-info { flex: 1; min-width: 0; }
.chat-conv-item-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
}
.chat-conv-item-head strong { font-size: 14px; }
.chat-conv-item-head span { font-size: 11px; color: #94a3b8; }
.chat-conv-item-info p {
    font-size: 12px;
    color: #64748b;
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.chat-unread-badge {
    background: var(--theme);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    min-width: 20px;
    height: 20px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
}
.chat-consultant-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: none;
    border: none;
    width: 100%;
    cursor: pointer;
    transition: background 0.15s;
    text-align: left;
    border-bottom: 1px solid #f8fafc;
}
.chat-consultant-item:hover { background: #f8fafc; }
.chat-consultant-info { flex: 1; text-align: left; }
.chat-consultant-info strong { display: block; font-size: 14px; }
.chat-consultant-info span { font-size: 12px; color: #64748b; }
</style>

<script>
document.querySelectorAll('.js-date-format-compact').forEach(function(el) {
    var raw = el.dataset.date;
    if (!raw) return;
    var d = new Date(raw);
    if (isNaN(d)) return;
    var day = ('0' + d.getDate()).slice(-2);
    var month = ('0' + (d.getMonth() + 1)).slice(-2);
    var year = d.getFullYear();
    var hours = ('0' + d.getHours()).slice(-2);
    var minutes = ('0' + d.getMinutes()).slice(-2);
    el.textContent = day + '/' + month + '/' + year + ' ' + hours + ':' + minutes;
});
</script>
</body>
</html>
