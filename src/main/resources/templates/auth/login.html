<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="auth-page">
  <div class="auth-card reveal">
    <a class="brand-logo justify-content-center mb-4" th:href="@{/}" href="/">
      <span class="brand-mark"><i class="fa-solid fa-plane-departure"></i></span>
      <span>WebDuLich</span>
    </a>

    <h1>Đăng nhập</h1>
    <p>Đăng nhập để quản lý tài khoản, lưu lịch trình và theo dõi các yêu cầu tư vấn tour của bạn.</p>

    <div class="alert alert-success" th:if="${successMessage}">
      <i class="fa-solid fa-circle-check me-2"></i>
      <span th:text="${successMessage}">Thành công</span>
    </div>

    <div class="alert alert-danger" th:if="${errorMessage}">
      <i class="fa-solid fa-circle-exclamation me-2"></i>
      <span th:text="${errorMessage}">Có lỗi xảy ra</span>
    </div>

    <form th:action="@{/login}" action="/login" method="post">
      <input class="form-control"
             type="email"
             name="email"
             placeholder="Email của bạn"
             th:value="${email}"
             required>

      <div class="password-field">
        <input class="form-control"
               type="password"
               name="password"
               placeholder="Mật khẩu"
               required>
        <button type="button" class="password-toggle">
          <i class="fa-regular fa-eye"></i>
        </button>
      </div>

      <div class="auth-row">
        <label><input type="checkbox" name="remember"> Ghi nhớ đăng nhập</label>
        <a href="#">Quên mật khẩu?</a>
      </div>

      <button class="btn btn-theme w-100 magnetic-btn" type="submit">Đăng nhập</button>
    </form>

    <p class="auth-bottom">Chưa có tài khoản? <a th:href="@{/register}" href="/register">Đăng ký ngay</a></p>
  </div>
</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
